<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tierpsychologie | Intro</title>
  <style>
    :root {
      --overlay-light: rgba(32, 24, 18, 0.08);
      --overlay-dark: rgba(32, 24, 18, 0.20);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
    }

    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #000;
      overflow: hidden;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: #ffffff;
      z-index: 9999;
      pointer-events: none;
      opacity: 1;
      transition: opacity 0.9s ease;
    }

    body.page-visible::after {
      opacity: 0;
    }

    body.page-fade-out::after {
      opacity: 1;
      pointer-events: auto;
    }

    .intro {
      position: relative;
      width: 100%;
      min-height: 100vh;
      background:
        linear-gradient(var(--overlay-light), var(--overlay-dark)),
        url("files/Gassi.jpg") center center / cover no-repeat;
      animation: fadeInPage 1.8s ease forwards;
      opacity: 0;
      overflow: hidden;
    }

    .intro::before,
    .intro::after {
      content: "";
      position: absolute;
      inset: -10%;
      pointer-events: none;
      z-index: 1;
    }

    .intro::before {
      background:
        radial-gradient(circle at 12% 22%, rgba(255,255,255,0.36) 0 20px, transparent 21px),
        radial-gradient(circle at 26% 68%, rgba(255,244,220,0.28) 0 28px, transparent 29px),
        radial-gradient(circle at 48% 20%, rgba(255,255,255,0.24) 0 16px, transparent 17px),
        radial-gradient(circle at 64% 62%, rgba(255,240,210,0.30) 0 34px, transparent 35px),
        radial-gradient(circle at 82% 30%, rgba(255,255,255,0.30) 0 22px, transparent 23px),
        radial-gradient(circle at 90% 72%, rgba(255,248,230,0.24) 0 18px, transparent 19px);
      filter: blur(12px);
      animation: bokehFloat1 6s ease-in-out infinite alternate;
      opacity: 1;
    }

    .intro::after {
      background:
        radial-gradient(circle at 18% 82%, rgba(255,255,255,0.24) 0 42px, transparent 43px),
        radial-gradient(circle at 38% 42%, rgba(255,245,225,0.28) 0 36px, transparent 37px),
        radial-gradient(circle at 58% 84%, rgba(255,255,255,0.20) 0 26px, transparent 27px),
        radial-gradient(circle at 74% 18%, rgba(255,243,220,0.24) 0 44px, transparent 45px),
        radial-gradient(circle at 92% 52%, rgba(255,255,255,0.20) 0 30px, transparent 31px);
      filter: blur(20px);
      animation: bokehFloat2 8s ease-in-out infinite alternate;
      opacity: 0.95;
    }

    .logo-link {
      position: absolute;
      left: 10%;
      top: 50%;
      transform: translateY(-50%);
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      z-index: 3;
      opacity: 0;
      animation:
        fadeInLogo 1.8s ease 0.4s forwards,
        floatLogo 4.8s ease-in-out 2.2s infinite;
    }

    .logo-hint {
      margin-top: 0.9rem;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.9);
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.35);
    }

    .logo-link:hover {
      animation-play-state: paused;
    }

    .logo-link:hover .logo {
      transform: scale(1.08);
    }

    .logo-link:hover .logo-wrap::after {
      opacity: 1;
      transform: scale(1.1);
    }

    .logo-link:focus-visible {
      outline: 3px solid rgba(255, 255, 255, 0.95);
      outline-offset: 8px;
      border-radius: 18px;
    }

    .logo-wrap {
      position: relative;
      display: inline-block;
    }

    .logo-wrap::before {
      content: "";
      position: absolute;
      left: 50%;
      bottom: -22px;
      transform: translateX(-50%);
      width: 74%;
      height: 30px;
      background: rgba(0, 0, 0, 0.32);
      filter: blur(20px);
      border-radius: 50%;
      z-index: -2;
      animation: shadowFloat 4.8s ease-in-out 2.2s infinite;
    }

    .logo-wrap::after {
      content: "";
      position: absolute;
      inset: -18px;
      background:
        radial-gradient(circle, rgba(255,255,255,0.40) 0%, rgba(255,245,220,0.24) 28%, rgba(255,255,255,0.08) 52%, rgba(255,255,255,0) 75%);
      filter: blur(18px);
      opacity: 0.9;
      z-index: -1;
      pointer-events: none;
      animation: shimmerGlow 2.4s ease-in-out infinite;
      transition: 0.3s ease;
    }

    .logo {
      width: min(40vw, 470px);
      max-width: 80vw;
      height: auto;
      display: block;
      transform-origin: center;
      transition: transform 0.3s ease;
      filter:
        drop-shadow(0 10px 18px rgba(0, 0, 0, 0.22))
        drop-shadow(0 24px 34px rgba(0, 0, 0, 0.18));
      animation: logoSparkle 2.2s ease-in-out infinite;
    }

    @keyframes fadeInPage {
      from {
        opacity: 0;
        transform: scale(1.02);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes fadeInLogo {
      from {
        opacity: 0;
        transform: translateY(-50%) scale(0.9);
      }
      to {
        opacity: 1;
        transform: translateY(-50%) scale(1);
      }
    }

    @keyframes floatLogo {
      0%, 100% {
        transform: translateY(-50%);
      }
      50% {
        transform: translateY(calc(-50% - 12px));
      }
    }

    @keyframes shadowFloat {
      0%, 100% {
        transform: translateX(-50%) scale(1);
        opacity: 0.30;
      }
      50% {
        transform: translateX(-50%) scale(0.90);
        opacity: 0.16;
      }
    }

    @keyframes shimmerGlow {
      0%, 100% {
        opacity: 0.75;
        transform: scale(1);
        filter: blur(18px);
      }
      50% {
        opacity: 1;
        transform: scale(1.08);
        filter: blur(22px);
      }
    }

    @keyframes logoSparkle {
      0%, 100% {
        filter:
          drop-shadow(0 10px 18px rgba(0, 0, 0, 0.22))
          drop-shadow(0 24px 34px rgba(0, 0, 0, 0.18))
          drop-shadow(0 0 8px rgba(255,255,255,0.10))
          drop-shadow(0 0 14px rgba(255,245,220,0.10));
      }
      50% {
        filter:
          drop-shadow(0 10px 18px rgba(0, 0, 0, 0.22))
          drop-shadow(0 24px 34px rgba(0, 0, 0, 0.18))
          drop-shadow(0 0 18px rgba(255,255,255,0.32))
          drop-shadow(0 0 34px rgba(255,245,220,0.24));
      }
    }

    @keyframes bokehFloat1 {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      100% {
        transform: translate3d(-34px, -22px, 0) scale(1.08);
      }
    }

    @keyframes bokehFloat2 {
      0% {
        transform: translate3d(0, 0, 0) scale(1);
      }
      100% {
        transform: translate3d(28px, 18px, 0) scale(1.1);
      }
    }

    @media (max-width: 900px) {
      .logo-link {
        left: 5%;
      }

      .logo {
        width: min(50vw, 390px);
      }
    }

    @media (max-width: 700px) {
      .logo-link {
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        animation:
          fadeInLogoMobile 1.8s ease 0.4s forwards,
          floatLogoMobile 4.8s ease-in-out 2.2s infinite;
      }

      .logo {
        width: min(66vw, 320px);
      }

      .logo-link:hover .logo {
        transform: scale(1.05);
      }

      @keyframes fadeInLogoMobile {
        from {
          opacity: 0;
          transform: translate(-50%, -50%) scale(0.9);
        }
        to {
          opacity: 1;
          transform: translate(-50%, -50%) scale(1);
        }
      }

      @keyframes floatLogoMobile {
        0%, 100% {
          transform: translate(-50%, -50%);
        }
        50% {
          transform: translate(-50%, calc(-50% - 8px));
        }
      }
    }

    @media (max-width: 480px) {
      .logo {
        width: min(74vw, 270px);
      }

      .intro::before {
        opacity: 0.65;
      }

      .intro::after {
        opacity: 0.55;
      }
    }
  </style>
</head>
<body>
  <main class="intro">
    <a class="logo-link" href="home.html" aria-label="Zur Home-Seite wechseln" id="intro-logo-link">
      <span class="logo-wrap">
        <img class="logo" src="files/PBlogo6.png" alt="Logo Tierpsychologie" />
      </span>
      <span class="logo-hint">klick hier</span>
    </a>
  </main>

  <script>
    window.addEventListener("load", () => {
      document.body.classList.add("page-visible");
    });

    const introLink = document.getElementById("intro-logo-link");

    introLink.addEventListener("click", function (e) {
      e.preventDefault();
      document.body.classList.remove("page-visible");
      document.body.classList.add("page-fade-out");

      setTimeout(() => {
        window.location.href = introLink.getAttribute("href");
      }, 700);
    });
  </script>
</body>
</html>
